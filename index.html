<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NILA - THE METAPHORIC EYES | EID 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #050505; /* Blackish background */
            font-family: 'Verdana', sans-serif;
            color: #fff;
        }

        /* 1. Cinematic Background Layer (Galaxy & Sea Parallax Mix) */
        .stage-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at bottom, #001f3f 0%, #000 100%);
            z-index: 1;
        }

        /* Continuous Dynamic Energy Particle (Breathing Styles) */
        .energy-particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
            animation: rise 5s infinite ease-out;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes rise {
            0% { transform: translateY(110vh) scale(1); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(0); opacity: 0; }
        }

        /* 2. Central Portrait & Metaphoric eyes Loop (The "Nila Portal") */
        .nila-loop-portal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            padding: 10px;
            /* Multi-Color Solar Flare Border (Carrying by Demons Effect) */
            background: linear-gradient(135deg, #00ffff, #ff00ff, #ffdf00);
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.4);
            animation: portalGlow 3s infinite ease-in-out;
            overflow: hidden; /* Important for the loop effect */
        }

        .loop-inner-container {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            background: #000;
        }

        .loop-image {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            transform: scale(1.05); /* Slight zoom for dramatic feel */
            filter: contrast(1.1) brightness(1); /* Enhanced for 8k effect */
        }

        .loop-image.active {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes portalGlow {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); box-shadow: 0 0 50px #00ffff; }
            50% { transform: translate(-50%, -52%) rotate(2deg); box-shadow: 0 0 90px #ff00ff; }
        }

        /* 3. Static Hashira Ladies (Vibrant & Animated At Bottom) */
        .char-squad-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60vh;
            display: flex;
            justify-content: space-evenly;
            align-items: flex-end;
            z-index: 10;
            padding-bottom: 20px;
            pointer-events: none;
        }

        .char-img {
            height: 90%;
            filter: drop-shadow(0 0 10px magenta);
            animation: characterFloat 4s infinite ease-in-out;
        }

        @keyframes characterFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* 4. Eid Wishes and "Good Lines" (Fire Glow Style) */
        .wish-header {
            position: absolute;
            top: 10%;
            width: 100%;
            text-align: center;
            z-index: 100;
        }

        .nila-title-text {
            font-size: 7rem;
            color: white;
            text-transform: uppercase;
            letter-spacing: 20px;
            margin: 0;
            text-shadow: 0 0 10px #00ffff, 0 0 30px #ff00ff;
            animation: textTitleGlow 3s infinite;
        }

        @keyframes textTitleGlow {
            0%, 100% { text-shadow: 0 0 10px #00ffff, 0 0 30px #ff00ff; }
            50% { text-shadow: 0 0 20px #ff00ff, 0 0 60px #00ffff; }
        }

        .eid-mubarak-subtitle {
            font-size: 3rem;
            color: #ffdf00; /* Gold */
            text-shadow: 2px 2px 10px #000;
            margin-top: -10px;
            letter-spacing: 5px;
        }

        .message-box {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid cyan;
            text-align: center;
            z-index: 100;
            opacity: 0.9;
        }

        .scroll-text {
            color: white;
            font-size: 1.2rem;
            font-style: italic;
            line-height: 1.6;
        }

        /* The Metaphoric Eyes Overlay - "Crying and Forgiving" */
        #forgiving-eyes {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            z-index: 60;
            pointer-events: none; /* Allows clicks to go through to other layers */
            opacity: 0.7;
            mix-blend-mode: screen; /* Integrates them dramatically */
            animation: eyesFade 3s infinite ease-in-out;
        }

        .metaphoric-eye {
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            filter: blur(10px);
            box-shadow: 0 0 30px cyan, 0 0 50px magenta;
        }

        #eye-left { top: 35%; left: 35%; }
        #eye-right { top: 35%; right: 35%; }

        @keyframes eyesFade {
            0%, 100% { opacity: 0.5; filter: blur(10px) drop-shadow(0 0 10px cyan); }
            50% { opacity: 0.9; filter: blur(5px) drop-shadow(0 0 30px magenta); }
        }

        /* Enter Button for Sound/VFX Trigger */
        #gatekeeper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: white; cursor: pointer; text-align: center;
        }

        .sword-icon {
            width: 100px;
            margin-bottom: 20px;
            animation: spin 3s infinite linear;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="gatekeeper" onclick="activateExperience()">
        <img src="https://cdn-icons-png.flaticon.com/512/1065/1065505.png" class="sword-icon" alt="Nichirin Blade">
        <h2>CLICK TO ACTIVATE NILA'S WORLD</h2>
        <p>(Demon Slayer for you)</p>
    </div>

    <div class="stage-bg"></div>

    <div id="forgiving-eyes">
        <div class="metaphoric-eye" id="eye-left"></div>
        <div class="metaphoric-eye" id="eye-right"></div>
    </div>

    <div id="particle-field"></div>

    <div class="wish-header">
        <h1 class="nila-title-text">NILA</h1>
        <div class="eid-mubarak-subtitle">EID MUBARAK</div>
    </div>

    <div class="nila-loop-portal">
        <div class="loop-inner-container">
            <img src="image_0.png" class="loop-image active" alt="Nila Portrait" style="filter: sepia(1) hue-rotate(-20deg) contrast(1.1);" id="nila-main-photo">
            
            <img src="1.png" class="loop-image" alt="Anime Character 1">
            
            <img src="2.jpg" class="loop-image" alt="Anime Character 2">
            
            <img src="3.png" class="loop-image" alt="Anime Character 3">
        </div>
    </div>

    <div class="char-squad-container">
        <img src="nila.png" class="char-img" style="filter: drop-shadow(0 0 10px #ff69b4);margin-top:-100px!important;">
        <img src="https://www.pngmart.com/files/13/Anime-Girl-PNG-Photos.png" class="char-img" style="filter: drop-shadow(0 0 10px #bc13fe);">
    </div>

    <div class="message-box">
        <p class="scroll-text">
            "Your smile is the brightest breathing style of all. Just as a Demon Slayer fights for a beautiful tomorrow, may this Eid fill your life with unending light, strength, and vibrant joy. Eid Mubarak, Nila."
        </p>
    </div>

    <audio id="bg-audio" loop>
        <source src="https://files.catbox.moe/88sxp4.mp3" type="audio/mpeg">
    </audio>

    <script>
        function activateExperience() {
            document.getElementById('gatekeeper').style.display = 'none';
            
            // Fixed Audio Reference
            var audio = document.getElementById('bg-audio');
            audio.play().catch(function(error) {
                console.log("Autoplay blocked or link issue: ", error);
            });
            
            document.body.style.animation = "shake 0.5s";
            createBreathingParticles();
            startCharacterLoop();
        }

        function createBreathingParticles() {
            const container = document.getElementById('particle-field');
            const colors = ['#00ffff', '#ff00ff', '#ffdf00', '#ff69b4'];
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'energy-particle';
                const size = Math.random() * 8 + 4;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.animationDuration = (Math.random() * 3 + 2) + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(particle);
            }
        }

        let currentIndex = 0;
        const images = document.querySelectorAll('.loop-image');
        const loopInterval = 4000;

        function startCharacterLoop() {
            setInterval(() => {
                images[currentIndex].classList.remove('active');
                currentIndex = (currentIndex + 1) % images.length;
                images[currentIndex].classList.add('active');
            }, loopInterval);
        }
    </script>
    
    <style>
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            10% { transform: translate(-1px, -2px); }
            30% { transform: translate(3px, 2px); }
            50% { transform: translate(-1px, 2px); }
            70% { transform: translate(3px, 0px); }
            100% { transform: translate(0px, 0px); }
        }
    </style>
</body>
</html>
